name: TimbSwap Settler
uses: actions/upload-pages-artifact@v3
with:
    path: './timbswap'

on:
  schedule:
    # Settle check every 10 minutes
    - cron: "*/10 * * * *"
    # Health check every day at noon UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "settle"
        type: choice
        options:
          - settle
          - health

jobs:
  settle:
    name: Settle segment
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install ethers
        working-directory: scripts

      - name: Run settler
        working-directory: scripts
        env:
          ARB_SEPOLIA_RPC:      ${{ secrets.ARB_SEPOLIA_RPC }}
          SETTLER_PRIVATE_KEY:  ${{ secrets.SETTLER_PRIVATE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "health" ] || \
             [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            node settler.js --health
          else
            node settler.js
          fi
