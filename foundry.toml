[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
cache_path     = "cache"

# Compiler
solc_version   = "0.8.20"
optimizer      = true
optimizer_runs = 200
via_ir         = true

# EVM
evm_version    = "paris"

# Testing
verbosity      = 2
fuzz_runs      = 1000
fuzz_seed      = 0x1234

# Gas reporting
gas_reports    = ["*"]

# Remappings
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# ─── Arbitrum Sepolia ─────────────────────────────────────────────────────────

[rpc_endpoints]
arb_sepolia = "${ARB_SEPOLIA_RPC}"
localhost   = "http://127.0.0.1:8545"

[etherscan]
arb_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

# ─── Sourcify (preferred verifier) ───────────────────────────────────────────
# Use: --verify --verifier sourcify
# Sourcify does not require an API key

# ─── Profiles ─────────────────────────────────────────────────────────────────

[profile.ci]
fuzz_runs = 5000
verbosity = 3

[profile.lite]
optimizer      = false
fuzz_runs      = 100
